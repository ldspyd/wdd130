<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitewater Rafting</title>
</head>
<body>
    <div id="content">
        <header>
            <a id="logo_link" href="index.html" target="_blank">
                <img class="logo" src="images/wwr_logo.png" alt="logo image" width="550">
            </a>
            <nav>
                <a href="index.html" target="_blank">Home</a>
                <a href="#" target="_blank">Page 2</a>
                <a href="site-plan-rafting.html" target="_blank">Site Plan</a>
                <a href="contactus.html" target="_blank">Contact Us</a>
            </nav>
        </header>
        <div id="hero">
            <div id="hero-box">
                <img id="hero-img" src="images/hero.png" alt="image">
            </div>
            <section id="hero-msg">
                <h1 class="home-title">White Water Rafting is fun!</h1>
                <h4>Make stories and share with us!</h4>
                <div class="button-box">
                    <a class="book" href="contactus.html" target="_blank">Book your trip</a>
                </div>
            </section>
        </div>
        <main class="home-grid">
            <section class="rivers-card">
                <img class="card-img" src="images/rivers.jpg" alt="river image">
                <img class="icon" src="images/river_icon.png" alt="river icon">
                <h2>Rivers</h2>
            </section>
            <section class="camping-card">
                <img class="card-img" src="images/camping.jpg" alt="tent image">
                <img class="icon" src="images/fire_icon.png" alt="fire icon">
                <h2>Camp</h2>
            </section>
            <section class="rapids-card">
                <img class="card-img" src="images/rapids.jpg" alt="rafting boat image">
                <img class="icon" src="images/rapids_icon.png" alt="rapids icon">
                <h2>Rapids</h2>
            </section>
            <div id="background"></div> 
            <img class="mountains" src="images/mountains.jpg" alt="mountains image">
            <section class="msg">
                <h2>A great adventure</h2>
                <p>You will never regret to see great sceneries and thrilling activities</p>
                <a class='join' href="rivers.html">Join Us</a>
            </section>
        </main>
        <footer>
            <p>HAHA White Water Rafting &copy; 2026 Yedam Park</p>
            <p><a href="site-plan-rafting.html" target="_blank">Site plan</a></p>
            <p><a href="contactus.html" target="_blank">Contact us</a></p>
            <div calss="social">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.png" alt="fb icon">
            </a>
            <a href="https://twitter.com" target="_blank">
                <img src="images/twitter.png" alt="twitter icon">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="images/instagram.png" alt="instagram icon">
            </a>
            </div>
        </footer>
    </div>
</body>
</html>
