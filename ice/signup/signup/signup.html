<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            /* background: rgb(120, 96, 64); */
            background-color: bisque;
            font-family: 'Times New Roman', Times, serif;
        }
        #container{
            border-radius: 20px;
            border: 10px solid darkblue;
            margin: 20px;
            width: 400px;
            justify-self: center;
            overflow: hidden;
        }
        header {
            background-image: url("images/jesus_feeds_5000.jpeg");
            background-size: 400px;
            justify-items: center;
            height: 170px;
            width: 400px;
            display: grid;
            gap: 5px;
            grid-template-rows: 85px 30px 30px;
            align-items: center;
            color: white;
            text-shadow: 2px 2px black;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.05em;
        }
        #formContainer {
            background-color: white;
        }
        #closeBtn {
            justify-self: left;
            align-self: flex-start;
            margin:10px;
            transition: transform 0.1s ease;
        }
        #closeBtn:hover {
            transform: translateX(300px);
        }
        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 0px 15px 0px 15px;
        }
        .newsletter {
            grid-column: 1 / 3;
            justify-self: center;
        }
        .conditions {
            grid-column: 1 / 3;
            justify-self: center;
            text-align: center;
        }
        .submit {
            grid-column: 1 / 3;
            justify-self: center;
            margin-bottom: 10px;
        }
        h3 {
            padding: 10px;
            margin-bottom: 10px;
            justify-self: center;
        }
        #scriptures {
            display: grid;
            gap: 6.25px;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            padding-top: 10px;
        }
        img {
            width: 75px;
        }
    </style>




</head>

<body>
    <div id="container">

        <header>
            <!-- <img src="images/jesus_feeds_5000.jpeg" alt="Jesus feeds 5000" /> -->
            <button type="button" id="closeBtn">X</button>
            
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </header>
        <div id="formContainer">
            <h3>Sign Up for Daily Scripture Feed</h3>
            <form id="myForm">
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label><br>
                    <input type="radio" id="prefer not to answer" name="gender" value="prefer not to answer" required>
                    <label for="prefer not to answer">Prefer not to answer</label>
                </div>

                <section class="newsletter">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>
                
                <section class="conditions">
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label><br>
                    <a href="/ice/signup/signup/Haha.txt" target="_blank">Terms and Conditions</a>
                </section>
                
                <section class="submit">
                    <button type="submit" id="submit">Submit</button>
                </section>
            </form>
            <div id="scriptures">
                <img src="images/old_testament.webp" alt="Old Testament">
                <img src="images/new_testament.webp" alt="New Testament">
                <img src="images/book_of_mormon.webp" alt="Book of Mormon">
                <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
                <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
            </div>
        </div>
    </div>

    <div id="output"></div>
    
    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
        });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting
            
            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
